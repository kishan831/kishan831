name: Generate Snake

on:
  # Runs automatically every day at midnight UTC
  schedule:
    - cron: "0 0 * * *"
  
  # Allows you to run it manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Generate snake SVGs from contribution graph
      - uses: Platane/snk@v3
        with:
          github_user_name: kishan831
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      # Push generated files to the 'output' branch
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
